---
# =========================
# 1) Shared for all profiles
# =========================
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:file:./target/h2db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  liquibase:
    enabled: false # let Liquibase apply the outbox changesets
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      platform: h2
      mode: always
cds:
  data-source:
    auto-config:
      enabled: true
  outbox:
    enabled: false
  remote:
    services: # must match the CDS external service name
      MessageProcessingLogs:
        destination:
          name: BTP_CloudIntegration_API
        type: odata-v2
      MessageStore:
        destination:
          name: BTP_CloudIntegration_API
        type: odata-v2
      IntegrationContent:
        destination:
          name: BTP_CloudIntegration_API
        type: odata-v2
  sql:
    init: false
logging:
  level:
    com.sap.cds: ERROR
    com.sap.cds.adapter.odata.v4: ERROR
    com.sap.cds.adapter.odata.v4.processors: ERROR
    com.sap.cds.integration.cloudsdk: ERROR
    com.sap.cds.services: ERROR
    com.sap.cds.services.adapters.odata.remote: ERROR
    com.sap.cds.services.impl: ERROR
    com.sap.cds.services.impl.odata: ERROR
    com.sap.cds.services.impl.handlerregistry: ERROR
    com.sap.cds.properties: ERROR
    com.sap.cloud.sdk: ERROR
    com.sap.cloud.sdk.cloudplatform.connectivity: ERROR
    com.sap.cloud.sdk.datamodel.odata.client.request: ERROR
    com.binlah.sap.btp.cpi.cpi_message_viewer: WARN
    com.binlah.sap.btp.cpi.cpi_message_viewer.cqn: WARN
    com.binlah.sap.btp.cpi.cpi_message_viewer.handlers: WARN

---
# =========================
# 2) LOCAL profile: mock security
# =========================
spring:
  config:
    activate:
      on-profile: local
cds:
  security:
    xsuaa:
      enabled: false
    mock:
      enabled: true
      users:
        binla:
          password: binla
          roles:
            - MessageViewer
            - MessageProcessor
        song:
          password: song
          roles:
            - MessageViewer

---
# =========================
# 3) CLOUD profile: XSUAA (for BTP)
# =========================
spring:
  config:
    activate:
      on-profile: hybrid, cloud

cds:
  security:
    xsuaa:
      enabled: true
    mock:
      enabled: false

---
# =========================
# 4) Actuator / health (all profiles)
# =========================
management:
  endpoint:
    health:
      show-components: always
      probes.enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    defaults.enabled: false
    ping.enabled: true
    db.enabled: true
